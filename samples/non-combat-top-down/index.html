<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Top-down Botanical Survey</title>
    <style>
      body { margin: 0; color: #eef7df; background: #101b18; font-family: sans-serif; }
      main { width: min-content; margin: 20px auto; }
      h1 { margin: 0 0 6px; font-size: 22px; }
      p { margin: 0 0 12px; color: #b8cdb4; }
      canvas { display: block; border: 1px solid #446552; }
    </style>
  </head>
  <body>
    <main>
      <h1>Botanical survey</h1>
      <p>Move with WASD or arrows. Press E near each specimen to observe it.</p>
      <p><strong>Objective:</strong> record all four specimens without combat or inventory.</p>
      <p><a href="https://github.com/MarcoABCardoso/phaser-game-engines/tree/main/packages/top-down">Contextual actions and lifecycle</a></p>
      <button type="button" onclick="window.location.reload()">Restart sample</button>
      <div id="game"></div>
    </main>
    <script type="module" src="./main.js"></script>
  </body>
</html>
