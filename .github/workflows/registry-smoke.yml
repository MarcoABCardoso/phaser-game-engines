name: Verify npm release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Exact published version to verify
        required: true
        type: string

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Verify exact registry packages and every starter variant
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: npm run verify:registry -- "$RELEASE_VERSION"
